<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; position: relative; overflow: hidden;
    background: #0a0c14; color: #eef0f5;
    font-family: 'Pretendard', 'Malgun Gothic', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; }
  .frame { position: absolute; inset: 84px; display: flex; flex-direction: column; }
  .kicker { color: #ffc447; font-size: 38px; font-weight: 700; }
  .date { color: #8a92a2; font-size: 32px; margin-top: 24px; }
  .mid { flex: 1; display: flex; flex-direction: column; justify-content: center; }
  .bar { width: 120px; height: 6px; background: #ffc447; margin-bottom: 48px; }
  h1 { font-size: 84px; font-weight: 800; line-height: 1.42; letter-spacing: -0.01em; }
  .hint { color: #8a92a2; font-size: 30px; }
</style>
<body>
  <div class="frame">
    <div class="kicker">매크로 비욘드 인사이트</div>
    <div class="date">2026년 07월 13일</div>
    <div class="mid">
      <div class="bar"></div>
      <h1>GPU는 무기,<br>메모리는 탄약</h1>
    </div>
    <div class="hint">넘겨서 확인하세요 →</div>
  </div>
</body>
