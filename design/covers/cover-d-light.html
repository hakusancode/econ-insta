<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; position: relative; overflow: hidden;
    background: #f7f5f0; color: #1a1c22;
    font-family: 'Pretendard', 'Malgun Gothic', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; }
  .frame { position: absolute; inset: 84px; display: flex; flex-direction: column; }
  .rule { height: 5px; background: #1a1c22; }
  .head { display: flex; justify-content: space-between; align-items: baseline; padding: 30px 0; }
  .kicker { font-size: 38px; font-weight: 800; }
  .kicker .dot { color: #d64545; }
  .date { font-size: 30px; color: #6b6f78; }
  .mid { flex: 1; display: flex; flex-direction: column; justify-content: center; }
  h1 { font-size: 96px; font-weight: 800; line-height: 1.32; letter-spacing: -0.02em; }
  h1 em { font-style: normal; box-shadow: inset 0 -0.38em 0 #ffd98a; }
  .sub { margin-top: 48px; font-size: 36px; color: #494d56; line-height: 1.55; }
  .footwrap { border-top: 2px solid #d8d4ca; padding-top: 28px;
    display: flex; justify-content: space-between; color: #6b6f78; font-size: 30px; }
</style>
<body>
  <div class="frame">
    <div class="rule"></div>
    <div class="head">
      <div class="kicker">매크로 비욘드 인사이트<span class="dot">.</span></div>
      <div class="date">2026년 07월 13일</div>
    </div>
    <div class="mid">
      <h1>GPU는 무기,<br><em>메모리는 탄약</em></h1>
      <div class="sub">AI 군비경쟁, 마지막에 웃는 쪽은<br>가장 늦게 공급이 늘어나는 산업이다</div>
    </div>
    <div class="footwrap"><span>@mansuki101</span><span>넘겨서 확인하세요 →</span></div>
  </div>
</body>
