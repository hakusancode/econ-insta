<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; position: relative; overflow: hidden;
    background: linear-gradient(165deg, #0b1020 0%, #131a36 55%, #1d1533 100%); color: #f2f4fa;
    font-family: 'Pretendard', 'Malgun Gothic', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; }
  .glow { position: absolute; width: 900px; height: 900px; left: -220px; top: 480px;
    background: radial-gradient(circle, rgba(255,196,71,.16) 0%, rgba(255,196,71,0) 60%); }
  .grid { position: absolute; inset: 0;
    background-image: linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
    background-size: 108px 108px; }
  .frame { position: absolute; inset: 84px; display: flex; flex-direction: column; }
  .pill { align-self: flex-start; border: 2px solid #ffc447; color: #ffc447; border-radius: 999px;
    padding: 14px 34px; font-size: 34px; font-weight: 700; }
  .date { color: #9aa3b8; font-size: 30px; margin-top: 26px; }
  .mid { flex: 1; display: flex; flex-direction: column; justify-content: center; }
  h1 { font-size: 92px; font-weight: 800; line-height: 1.34; letter-spacing: -0.015em; }
  h1 .accent { color: #ffc447; }
  .sub { color: #aab3c8; font-size: 36px; margin-top: 44px; line-height: 1.5; }
  .foot { display: flex; justify-content: space-between; align-items: center;
    color: #9aa3b8; font-size: 30px; }
  .foot .logo { font-weight: 700; color: #dfe4ee; }
</style>
<body>
  <div class="grid"></div>
  <div class="glow"></div>
  <div class="frame">
    <div class="pill">매크로 비욘드 인사이트</div>
    <div class="date">2026년 07월 13일</div>
    <div class="mid">
      <h1>GPU는 무기,<br><span class="accent">메모리는 탄약</span></h1>
      <div class="sub">AI 군비경쟁, 마지막에 웃는 쪽은<br>가장 늦게 공급이 늘어나는 산업이다</div>
    </div>
    <div class="foot"><span class="logo">@mansuki101</span><span>넘겨서 확인하세요 →</span></div>
  </div>
</body>
