# 데일리 브리핑 자동 발행 (스펙 docs/superpowers/specs/2026-07-17-daily-cron-design.md)
# KST 07:30 = 해외판(GLOBAL_FEEDS), KST 19:00 = 국내판(KR_FEEDS). GitHub cron은 UTC다.
#
# 에디션마다 크론이 두 개다 — GitHub은 스케줄을 늦추거나 통째로 빼먹는다
# (2026-07-19 국내판 66분 지연, 2026-07-20 국내판 미실행). 25분 뒤 예비 크론이
# 한 번 더 두드리고, 발행 성공 마커(published.txt)가 있으면 그대로 빠진다.
# 그래도 둘 다 실패하면 그날 그 에디션은 건너뛴다 — GitHub이 소유자에게 메일을 보낸다.

name: Daily briefing

on:
  schedule:
    - cron: "30 22 * * *"   # KST 다음날 07:30 — 해외판
    - cron: "55 22 * * *"   # 해외판 예비
    - cron: "0 10 * * *"    # KST 19:00 — 국내판
    - cron: "25 10 * * *"   # 국내판 예비
  workflow_dispatch:
    inputs:
      edition:
        description: "발행 에디션"
        type: choice
        options: [kr, global]
        required: true

permissions:
  contents: write   # 렌더 결과(out/)를 main에 커밋·push한다

concurrency: daily-briefing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: pip install -r requirements.txt

      - name: Determine edition
        id: edition
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            edition="${{ inputs.edition }}"
          else
            case "${{ github.event.schedule }}" in
              *" 22 * * *") edition=global ;;
              *)            edition=kr ;;
            esac
          fi
          echo "edition=$edition" >> "$GITHUB_OUTPUT"
          echo "date=$(TZ=Asia/Seoul date +%F)" >> "$GITHUB_OUTPUT"

      # 마커는 **자동 크론끼리의** 중복만 막는다(본편 성공 → 예비 크론 스킵).
      # 수동(dispatch) 실행은 마커를 확인도 기록도 하지 않는다 — 사용자가 낮에
      # 따로 올려도 그날 저녁 크론은 그대로 발행된다(2026-07-21 사용자 지시).
      # 마커는 Publish까지 끝난 뒤에만 커밋되므로, 렌더만 되고 발행이 죽은 날은
      # 예비 크론이 처음부터 다시 돈다.
      - name: Skip if already published
        id: guard
        run: |
          marker="out/${{ steps.edition.outputs.date }}-${{ steps.edition.outputs.edition }}/published.txt"
          if [ "${{ github.event_name }}" = "schedule" ] && [ -f "$marker" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "오늘 ${{ steps.edition.outputs.edition }}판은 이미 발행됨 ($(cat "$marker")) — 종료"
          fi

      - name: Render
        if: steps.guard.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # 네이버 인기도 재정렬(없으면 크로스소스 랭킹으로 저하). 실행당 최대 11콜.
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python -m econ_insta.daily --edition "${{ steps.edition.outputs.edition }}" --render

      # out/은 .gitignore라 -f가 필요하다. 발행이 raw URL을 요구하므로 push가 먼저다.
      - name: Host rendered cards
        if: steps.guard.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f out/
          git commit -m "out: daily ${{ steps.edition.outputs.edition }} ${{ steps.edition.outputs.date }} [skip ci]"
          git pull --rebase origin main
          git push origin main

      - name: Publish
        if: steps.guard.outputs.skip != 'true'
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
        run: python -m econ_insta.daily --edition "${{ steps.edition.outputs.edition }}" --publish

      - name: Mark published
        if: steps.guard.outputs.skip != 'true' && github.event_name == 'schedule'
        run: |
          marker="out/${{ steps.edition.outputs.date }}-${{ steps.edition.outputs.edition }}/published.txt"
          date -u +%FT%TZ > "$marker"
          git add -f "$marker"
          git commit -m "out: ${{ steps.edition.outputs.edition }} ${{ steps.edition.outputs.date }} 발행 마커 [skip ci]"
          git pull --rebase origin main
          git push origin main
